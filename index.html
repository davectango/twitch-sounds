<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tango Sound Commands</title>

<style>
body {
  margin: 0;
  padding: 20px;
  font-family: Arial, sans-serif;
}

.status {
  font-weight: bold;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="status" id="statusText">OFF</div>

<label>
  <input type="checkbox" id="enableToggle">
  Enable Sound Commands
</label>

<div>Click once before stream, then minimize this window.</div>

<script type="module">
import tmi from "https://esm.sh/tmi.js@1.8.5";

const channelName = "tangoplaysdead";

// 🔥 YOUR COMMANDS
const soundMap = {
  "!bruh": "https://www.myinstants.com/media/sounds/movie_1.mp3",
  "!horn": "https://www.myinstants.com/media/sounds/air-horn-club-sample_1.mp3",
  "!spin": "https://davectango.github.io/twitch-sounds/SPIN2WIN.mp3",
  "!sad": "https://www.myinstants.com/media/sounds/sad-trombone.mp3",
  "!battle": "https://www.myinstants.com/media/sounds/kshmr_war_horn_13__f_.mp3",
  "!win": "https://www.myinstants.com/media/sounds/victory.mp3",
  "!pole": "https://davectango.github.io/twitch-sounds/stuckonpole.mp3",
  "!stuck": "https://davectango.github.io/twitch-sounds/Jackiestuck.m4a",
  "!crack": "https://davectango.github.io/twitch-sounds/stuckoncrack.m4a",
  "!ham": "https://davectango.github.io/twitch-sounds/ham.m4a",
  "!van": "https://davectango.github.io/twitch-sounds/stuckvan.m4a"
  
  
};
  
  

const COOLDOWN_MS = 2000;
let lastPlay = 0;
let enabled = false;

const toggle = document.getElementById("enableToggle");
const statusText = document.getElementById("statusText");

toggle.addEventListener("change", () => {
  enabled = toggle.checked;
  statusText.textContent = enabled ? "ON - Connected" : "OFF";
});

function playSound(url) {
  const now = Date.now();
  if (now - lastPlay < COOLDOWN_MS) return;
  lastPlay = now;

  const audio = new Audio(url);
  audio.volume = 0.9;
  audio.play().catch(() => {});
}

const client = new tmi.Client({
  channels: [channelName]
});

await client.connect();

client.on("message", (channel, tags, message, self) => {
  if (self) return;
  if (!enabled) return;

  const cmd = message.trim().toLowerCase();
  if (soundMap[cmd]) {
    playSound(soundMap[cmd]);
  }
});
</script>

</body>
</html>
